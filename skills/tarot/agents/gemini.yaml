# Gemini extension manifest for the Tarot skill.
# Drop this folder into your Gemini CLI / Gemini Extensions config so the model
# can invoke the audited CLI instead of inventing a draw.

name: ai-divination-tarot
version: "0.6.1"
display_name: "Tarot"
description: "Draw tarot cards for reflective AI readings. The model never generates the draw — it calls the CLI and interprets the JSON."

mcp_servers:
  divination:
    command: "ai-divination"
    args: ["tarot"]
    description: "Audited local divination script. Returns JSON with method, seed-mode, and traditional-source metadata."

context_file: "../SKILL.md"

safety:
  inherits:
    - "../../../shared/safety-policy.md"
    - "../../../shared/methodology.md"

example_invocations:
  - "Should I take the offer from Project X?"
