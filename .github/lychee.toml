# Lychee config used by .github/workflows/link-check.yml
no_progress = true
max_concurrency = 4
accept = [200, 206, 429]
exclude_loopback = true
exclude = [
  # Anonymous fetches cannot see private settings pages.
  "^https://github\\.com/[^/]+/[^/]+/settings(/|$)",
  # Compare URLs for tags that have not been pushed yet (e.g. [Unreleased] anchor).
  "^https://github\\.com/[^/]+/[^/]+/compare/.*\\.\\.\\.HEAD$",
  # Compare URLs for our own version bumps — the tag is pushed only after this PR merges.
  "^https://github\\.com/sapuyou45-bit/ai-divination-skills/compare/v[0-9]+\\.[0-9]+\\.[0-9]+\\.\\.\\.v[0-9]+\\.[0-9]+\\.[0-9]+$",
]
