# Gemini extension manifest for the Bazi (八字 / Four Pillars) skill.
# Drop this folder into your Gemini CLI / Gemini Extensions config so the model
# can invoke the audited CLI instead of inventing a chart.

name: ai-divination-bazi
version: "0.7.0"
display_name: "Bazi (Four Pillars)"
description: "Cast a bazi (八字 / 四柱) chart from a Gregorian birth datetime. The model never generates the chart — it calls the CLI and interprets the JSON."

mcp_servers:
  divination:
    command: "ai-divination"
    args: ["bazi"]
    description: "Audited local bazi script. Returns JSON with year/month/day/hour pillars, NaYin, day master, and wuxing tally."

context_file: "../SKILL.md"

safety:
  inherits:
    - "../../../shared/safety-policy.md"
    - "../../../shared/methodology.md"

example_invocations:
  - "Read my bazi: born 1990-05-20 at 14:30."
