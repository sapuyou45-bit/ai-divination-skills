name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Verify CLI entry point
        run: |
          ai-divination tarot --spread three-card --seed demo > /tmp/tarot.json
          ai-divination iching --method yarrow --seed demo > /tmp/iching.json
          ai-divination xiaoliuren --method numbers --month 3 --day 12 --hour 7 > /tmp/xlr.json
          python3 - <<'PY'
          import json, pathlib
          for path in ["/tmp/tarot.json", "/tmp/iching.json", "/tmp/xlr.json"]:
              data = json.loads(pathlib.Path(path).read_text())
              assert isinstance(data, dict), path
          print("CLI smoke OK")
          PY
